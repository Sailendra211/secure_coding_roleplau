<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Withdraw - Protected</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #effdf5;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 760px;
            margin: 40px auto;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }
        .tag {
            display: inline-block;
            margin-bottom: 14px;
            background: #dcfce7;
            color: #166534;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: bold;
        }
        .title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .sub {
            color: #6b7280;
            margin-bottom: 16px;
        }
        .banner {
            background: #dcfce7;
            color: #166534;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 18px;
            font-weight: bold;
        }
        .balance {
            font-size: 22px;
            margin-bottom: 20px;
        }
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            margin-bottom: 14px;
            font-size: 15px;
            box-sizing: border-box;
        }
        .btn {
            border: none;
            padding: 12px 18px;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-size: 15px;
            background: #2563eb;
        }
        .back {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #2563eb;
        }
        .code {
            margin-top: 20px;
            background: #111827;
            color: #f9fafb;
            padding: 14px;
            border-radius: 12px;
            font-family: monospace;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="tag">PROTECTED PAGE</div>
            <div class="title">Withdraw Funds</div>
            <div class="sub">This version has anti-clickjacking protection enabled.</div>

            <div class="banner">
                Protection active: X-Frame-Options: DENY + CSP frame-ancestors 'none'
            </div>

            <div class="balance">Available Balance: <strong>₹{{ bank.balance }}</strong></div>

            <form action="{{ url_for('process_withdraw') }}" method="post">
                <input type="hidden" name="mode" value="custom">
                <input type="number" name="amount" placeholder="Enter amount, e.g. 500" min="1" max="{{ bank.balance }}">
                <button class="btn" type="submit">Withdraw Entered Amount</button>
            </form>

            <div class="code">Headers added:
X-Frame-Options: DENY
Content-Security-Policy: frame-ancestors 'none';</div>

            <a class="back" href="{{ url_for('bank') }}">← Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
